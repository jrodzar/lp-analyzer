name: Notify lp-analyzer-pro on push to main

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync in lp-analyzer-pro
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.PRO_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/jrodzar/lp-analyzer-pro/dispatches \
            -d '{"event_type":"public-main-updated"}'
