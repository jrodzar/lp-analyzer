name: Build Tailwind CSS

# Compila Tailwind en CI y commitea assets/styles.css de vuelta a main.
# Reemplaza el CDN runtime (cdn.tailwindcss.com) que pesaba ~285 KB y emitía
# el warning "should not be used in production". El compilado pesa ~15 KB y
# solo incluye las clases que realmente usamos (purge JIT).
#
# Triggers:
#   - Cambios en HTML/JS o en la config de Tailwind → recompila
#   - workflow_dispatch → recompila manualmente desde la UI
#
# NO recompila cuando solo cambia el CSS de salida (evita loop infinito) ni
# cuando solo cambian README/CLAUDE.md/.claude (no afectan al bundle).

on:
  push:
    branches: [main]
    paths:
      - "**.html"
      - "**.js"
      - "src/tailwind-input.css"
      - "tailwind.config.js"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/build-tailwind.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # No usamos `cache: npm` porque al primer build no existe lockfile
          # y la action falla. Con una sola dep (tailwindcss) npm install tarda
          # ~10s, no merece la complejidad de habilitar cache condicionalmente.

      - name: Install dependencies
        # npm ci si hay lockfile, si no fallback a npm install (primera vez)
        run: npm ci || npm install

      - name: Compile Tailwind
        run: npx tailwindcss -i src/tailwind-input.css -o assets/styles.css --minify

      - name: Commit compiled CSS if changed
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Asegurarse de que existe la carpeta y stagear el archivo aunque no
          # exista todavía (primer build)
          git add assets/styles.css package-lock.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes — nothing to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "build: recompile tailwind css"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"
